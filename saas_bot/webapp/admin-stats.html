<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Stats</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>if(typeof Chart==="undefined"){document.write('<scr'+'ipt src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></scr'+'ipt>');}</script>
  <link rel="stylesheet" href="/static/styles.css?v=20260517g">
  <style>
    .chart-wrap { position: relative; width: 200px; height: 200px; margin: 0 auto 10px; }
    .chart-legend { display: flex; flex-wrap: wrap; gap: 6px 14px; justify-content: center; padding: 0 16px 4px; }
    .chart-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--sub); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Peak hours chart */
    .peak-summary {
      margin-top: 10px; padding: 10px 14px; border-radius: 12px;
      background: rgba(255,122,24,0.1); border: 1px solid rgba(255,122,24,0.2);
      font-size: 13px; color: var(--text); text-align: center; line-height: 1.5;
    }
    .peak-summary strong { color: #ff7a18; }

    /* Bottom (least sold) hint */
    .bottom-hint {
      margin-top: 8px; font-size: 12px; color: var(--text-muted);
      text-align: center; line-height: 1.5;
    }
    .bottom-hint strong { color: #f87171; }

    /* Repeat customers */
    .repeat-wrap { display: flex; align-items: center; gap: 16px; padding: 4px 0 8px; }
    .repeat-big  { font-size: 52px; font-weight: 900; color: #ff7a18; line-height: 1; flex-shrink: 0; }
    .repeat-right { flex: 1; }
    .repeat-label { font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 8px; }
    .repeat-bar-wrap { height: 8px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
    .repeat-bar { height: 100%; border-radius: 999px; background: #ff7a18; transition: width .7s cubic-bezier(.22,.68,0,1.2); }
    .repeat-sub { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="page-title" data-t="page_title">📊 Statistika</div>
    <div class="page-sub" id="statsSub">—</div>
  </header>

  <main>
    <div id="errBox" class="err hidden" style="margin:14px"></div>
    <div id="loading" class="loading" data-t="loading">Yuklanmoqda…</div>

    <div id="metrics" class="dash-grid hidden">
      <div class="metric-card accent">
        <div class="metric-label" data-t="m_revenue">📅 Oylik daromad</div>
        <div class="metric-value" id="mRevTotal">0</div>
        <div class="metric-sub" id="mOrdTotal">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label" data-t="m_today">🟢 Bugun</div>
        <div class="metric-value" id="mRevToday">0</div>
        <div class="metric-sub" id="mOrdToday">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label" data-t="m_week">📅 Hafta</div>
        <div class="metric-value" id="mRevWeek">0</div>
        <div class="metric-sub" id="mOrdWeek">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label" data-t="m_users">👥 Mijozlar</div>
        <div class="metric-value" id="mUsers">0</div>
        <div class="metric-sub" id="mUsersToday">—</div>
      </div>
    </div>

    <section id="chartSection" class="dash-section hidden">
      <h3 data-t="s_chart">📈 So'nggi 7 kun daromadi</h3>
      <div style="position:relative;width:100%;height:180px"><canvas id="barChart"></canvas></div>
    </section>

    <section id="topSection" class="dash-section hidden">
      <h3 data-t="s_top">🏆 Eng ko'p sotilgan mahsulotlar</h3>
      <div id="topList" class="top-list"></div>
    </section>

    <section id="catRevSection" class="dash-section hidden">
      <h3 data-t="s_cat_revenue">🗂 Toifa bo'yicha daromad</h3>
      <div id="catRevChartWrap" style="position:relative;width:100%"><canvas id="catRevChart"></canvas></div>
    </section>

    <section id="repeatSection" class="dash-section hidden">
      <h3 data-t="s_repeat">🔁 Qaytuvchi mijozlar</h3>
      <div id="repeatStats"></div>
    </section>

    <section id="hoursSection" class="dash-section hidden">
      <h3 data-t="s_hours">🕐 Buyurtmalar pikida (24 soat)</h3>
      <div style="position:relative;width:100%;height:160px"><canvas id="peakChart"></canvas></div>
      <div id="peakSummary"></div>
    </section>

    <section id="bottomSection" class="dash-section hidden">
      <h3 data-t="s_bottom">📉 Kam sotilayotgan mahsulotlar</h3>
      <div style="position:relative;width:100%;height:230px"><canvas id="bottomChart"></canvas></div>
      <div id="bottomHint" class="bottom-hint"></div>
    </section>

    <section id="statusSection" class="dash-section hidden">
      <h3 data-t="s_status">📋 Status bo'yicha</h3>
      <div class="chart-wrap"><canvas id="statusChart"></canvas></div>
      <div id="chartLegend" class="chart-legend"></div>
    </section>
  </main>
