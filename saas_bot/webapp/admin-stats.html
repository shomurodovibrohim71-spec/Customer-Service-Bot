<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Stats</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="page-title" data-t="page_title">📊 Statistika</div>
    <div class="page-sub" id="statsSub">—</div>
  </header>

  <main>
    <div id="errBox" class="err hidden" style="margin:14px"></div>
    <div id="loading" class="loading" data-t="loading">Yuklanmoqda…</div>

    <div id="metrics" class="dash-grid hidden">
      <div class="metric-card accent">
        <div class="metric-label" data-t="m_revenue">📅 Oylik daromad</div>
        <div class="metric-value" id="mRevTotal">0</div>
        <div class="metric-sub" id="mOrdTotal">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label" data-t="m_today">🟢 Bugun</div>
        <div class="metric-value" id="mRevToday">0</div>
        <div class="metric-sub" id="mOrdToday">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label" data-t="m_week">📅 Hafta</div>
        <div class="metric-value" id="mRevWeek">0</div>
        <div class="metric-sub" id="mOrdWeek">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label" data-t="m_users">👥 Mijozlar</div>
        <div class="metric-value" id="mUsers">0</div>
        <div class="metric-sub" id="mUsersToday">—</div>
      </div>
    </div>

    <section id="chartSection" class="dash-section hidden">
      <h3 data-t="s_chart">📈 So'nggi 7 kun daromadi</h3>
      <div id="barChart" class="bar-chart"></div>
    </section>

    <section id="topSection" class="dash-section hidden">
      <h3 data-t="s_top">🏆 Eng ko'p sotilgan mahsulotlar</h3>
      <div id="topList" class="top-list"></div>
    </section>

    <section id="hoursSection" class="dash-section hidden">
      <h3 data-t="s_hours">🕐 Buyurtmalar pikida (24 soat)</h3>
      <div id="hoursRow" class="hours-row"></div>
      <div style="height:18px"></div>
    </section>

    <section id="statusSection" class="dash-section hidden">
      <h3 data-t="s_status">📋 Status bo'yicha</h3>
      <div id="statusList" class="top-list"></div>
    </section>
  </main>

  <script>
    window.STRINGS = {
      uz: {
        page_title: "📊 Statistika", loading: "Yuklanmoqda…",
        m_revenue: "📅 Oylik daromad", m_today: "🟢 Bugun", m_week: "📅 Hafta", m_users: "👥 Mijozlar",
        s_chart: "📈 So'nggi 7 kun daromadi", s_top: "🏆 Eng ko'p sotilgan mahsulotlar",
        s_hours: "🕐 Buyurtmalar pikida (24 soat)", s_status: "📋 Status bo'yicha",
        orders_count: "{n} ta buyurtma", users_today: "bugun: {n}",
        no_orders_yet: "Hozircha buyurtmalar yo'q", no_products_yet: "Hozircha sotilgan mahsulotlar yo'q",
        no_orders: "Buyurtmalar yo'q", qty_suffix: "ta",
        status_pending: "⏳ Kutilmoqda", status_confirmed: "✅ Tasdiqlangan",
        status_delivered: "📦 Yetkazilgan", status_cancelled: "❌ Bekor qilingan",
        day_short: ["Yak","Du","Sesh","Chor","Pay","Juma","Shan"],
        soum: "so'm",
      },
      en: {
        page_title: "📊 Statistics", loading: "Loading…",
        m_revenue: "📅 Monthly revenue", m_today: "🟢 Today", m_week: "📅 Week", m_users: "👥 Customers",
        s_chart: "📈 Revenue, last 7 days", s_top: "🏆 Top-selling products",
        s_hours: "🕐 Peak hours (24h)", s_status: "📋 By status",
        orders_count: "{n} orders", users_today: "today: {n}",
        no_orders_yet: "No orders yet", no_products_yet: "No products sold yet",
        no_orders: "No orders", qty_suffix: "pcs",
        status_pending: "⏳ Pending", status_confirmed: "✅ Confirmed",
        status_delivered: "📦 Delivered", status_cancelled: "❌ Cancelled",
        day_short: ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
        soum: "so'm",
      },
      ru: {
        page_title: "📊 Статистика", loading: "Загрузка…",
        m_revenue: "📅 Доход за месяц", m_today: "🟢 Сегодня", m_week: "📅 Неделя", m_users: "👥 Клиенты",
        s_chart: "📈 Доход за 7 дней", s_top: "🏆 Самые продаваемые товары",
        s_hours: "🕐 Пиковые часы (24 ч)", s_status: "📋 По статусам",
        orders_count: "{n} заказов", users_today: "сегодня: {n}",
        no_orders_yet: "Заказов пока нет", no_products_yet: "Продаж пока нет",
        no_orders: "Заказов нет", qty_suffix: "шт",
        status_pending: "⏳ В ожидании", status_confirmed: "✅ Подтверждён",
        status_delivered: "📦 Доставлен", status_cancelled: "❌ Отменён",
        day_short: ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"],
        soum: "сум",
      },
    };
  </script>
  <script src="/static/i18n.js"></script>
  <script src="/static/admin-stats.js"></script>
</body>
</html>
