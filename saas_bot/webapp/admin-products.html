  <style>
    /* ── Product list row (replaces card grid) ──────────────────────────── */
    .admin-prod-list { display: flex; flex-direction: column; gap: 6px; }

    .apr {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r-md); padding: 10px 12px;
      transition: border-color .2s;
    }
    .apr.prod-hidden  { opacity: .55; border-style: dashed; }
    .apr.out-of-stock { opacity: .6; }

    /* Thumbnail */
    .apr-thumb {
      width: 54px; height: 54px; flex-shrink: 0;
      border-radius: 10px; object-fit: cover;
      background: var(--bg-soft);
    }
    .apr-thumb-empty {
      width: 54px; height: 54px; flex-shrink: 0;
      border-radius: 10px; background: var(--bg-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }

    /* Info */
    .apr-info { flex: 1; min-width: 0; }
    .apr-name {
      font-size: 14px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .apr-price { font-size: 12px; font-weight: 800; color: var(--brand); margin-top: 2px; }

    /* Hidden badge */
    .prod-hidden-badge {
      display: inline-block; font-size: 9px; font-weight: 800;
      background: rgba(255,93,93,.18); color: var(--danger);
      padding: 1px 5px; border-radius: 4px; vertical-align: middle; margin-left: 4px;
    }

    /* Toggle switch */
    .prod-toggle-wrap {
      flex-shrink: 0; display: flex; align-items: center;
      position: relative; height: 28px; cursor: pointer;
    }
    .prod-toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
    .prod-toggle-slider {
      position: relative; display: block;
      width: 44px; height: 24px; border-radius: 999px;
      background: rgba(255,255,255,0.12); transition: background .2s;
    }
    .prod-toggle-slider::before {
      content: ""; position: absolute;
      width: 18px; height: 18px; border-radius: 50%; background: #fff;
      left: 3px; top: 3px; transition: transform .2s, box-shadow .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }
    .prod-toggle-wrap input:checked + .prod-toggle-slider { background: #ff7a18; }
    .prod-toggle-wrap input:checked + .prod-toggle-slider::before { transform: translateX(20px); }

    /* Edit / delete buttons */
    .apr-btn {
      flex-shrink: 0; width: 36px; height: 36px;
      border-radius: 10px; border: none; cursor: pointer;
      font-size: 15px; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s, transform .1s;
    }
    .apr-btn:active { opacity: .7; transform: scale(0.93); }
    .apr-edit { background: rgba(255,122,24,.15); color: var(--brand); }
    .apr-del  { background: rgba(255,93,93,.12);  color: var(--danger); }

    /* upsell toggle row */
    .upsell-row { display: flex; align-items: center; justify-content: space-between; background: var(--card, #1f232d); border-radius: 12px; padding: 11px 14px; }
    .upsell-row-name { font-size: 14px; color: var(--text, #f5f7fb); }
    .upsell-toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .upsell-toggle input { opacity: 0; width: 0; height: 0; }
    .upsell-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 999px; cursor: pointer; transition: background .2s; }
    .upsell-toggle input:checked + .upsell-slider { background: #ff7a18; }
    .upsell-slider::before { content: ""; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #fff; left: 3px; top: 3px; transition: transform .2s; }
    .upsell-toggle input:checked + .upsell-slider::before { transform: translateX(20px); }
  </style>

      </div>
    </div>
  </section>

  <!-- Edit modal -->

    <header class="screen-header">
      <button class="back-btn" id="editBack" type="button" data-t="back">Orqaga</button>
      <h2 id="editTitle" data-t="edit_title">✏ Tahrirlash</h2>
    </header>
    <div class="form" id="editForm">
      <label><span data-t="lbl_name">🍔 Nom</span> <input id="fName" type="text"></label>
      <label><span data-t="lbl_cat">🗂 Toifa</span>
        <select id="fCategory"></select>
      </label>
      <label><span data-t="lbl_price">💰 Narx (so'm)</span> <input id="fPriceVal" type="number" min="0" step="100"></label>
      <label><span data-t="lbl_desc">📝 Tavsif</span> <textarea id="fDesc" rows="3"></textarea></label>
      <label><span data-t="lbl_image">🖼 Rasm URL</span> <input id="fImage" type="url" placeholder="https://..."></label>
      <button id="saveBtn" class="primary-btn" data-t="save_btn">✅ Saqlash</button>
      <button id="delBtn" class="ghost-btn" style="border-color:#a23" data-t="del_btn">🗑 O'chirish</button>
      <div id="formErr" class="err hidden"></div>
    </div>
