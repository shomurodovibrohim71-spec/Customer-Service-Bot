<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Products</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/styles.css?v=20260517">
  <style>
    /* Product card — premium redesign */
    .admin-prod-card {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r-lg); overflow: hidden; position: relative;
      transition: border-color .2s var(--ease);
    }
    .admin-prod-card.out-of-stock { opacity: .6; }
    .admin-prod-card .prod-img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      background: var(--bg-soft); display: block;
    }
    .admin-prod-img-empty {
      width: 100%; aspect-ratio: 4/3; display: flex; align-items: center;
      justify-content: center; font-size: 32px; background: var(--bg-soft);
    }
    .prod-body { padding: 10px 12px 0; }
    .prod-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prod-price { font-size: 13px; font-weight: 800; color: var(--brand); margin-bottom: 8px; }
    .prod-actions { display: flex; gap: 5px; padding: 0 12px 10px; }
    .prod-btn {
      flex: 1; padding: 7px 0; border-radius: var(--r-md); border: none;
      font-size: 11px; font-weight: 700; cursor: pointer; text-align: center;
      transition: opacity .15s, transform .1s var(--ease);
    }
    .prod-btn:active { opacity: .75; transform: scale(0.97); }
    .prod-btn-edit { background: rgba(255,122,24,.15); color: var(--brand); }
    .prod-btn-del  { background: rgba(255,93,93,.12); color: var(--danger); max-width: 36px; }
    .prod-btn-stock-in  { background: rgba(74,222,128,.12); color: #4ade80; }
    .prod-btn-stock-out { background: rgba(255,93,93,.12); color: var(--danger); }

    /* upsell toggle row */
    .upsell-row { display: flex; align-items: center; justify-content: space-between; background: var(--card, #1f232d); border-radius: 12px; padding: 11px 14px; }
    .upsell-row-name { font-size: 14px; color: var(--text, #f5f7fb); }
    .upsell-toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .upsell-toggle input { opacity: 0; width: 0; height: 0; }
    .upsell-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 999px; cursor: pointer; transition: background .2s; }
    .upsell-toggle input:checked + .upsell-slider { background: #ff7a18; }
    .upsell-slider::before { content: ""; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #fff; left: 3px; top: 3px; transition: transform .2s; }
    .upsell-toggle input:checked + .upsell-slider::before { transform: translateX(20px); }

    /* old stock badge styles kept for compatibility */
    .stock-badge.in  { background: rgba(74,222,128,0.18); color: #4ade80; }
    .stock-badge.out { background: rgba(255,93,93,0.15); color: #f87171; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="page-title" data-t="page_title">📦 Mahsulotlar</div>
    <div class="page-sub" id="prodCount">—</div>
  </header>
  <main id="content" class="content">
    <div class="action-row">
      <button id="addBtn" class="primary-btn" data-t="add_product">➕ Yangi mahsulot</button>
      <button id="catsBtn" class="ghost-btn" data-t="manage_cats">🗂 Toifalar</button>
    </div>
    <div id="list" class="admin-list">
      <div class="loading" data-t="loading">Yuklanmoqda…</div>
    </div>
  </main>

  <!-- Categories management screen -->
  <section id="catsScreen" class="screen hidden">
    <header class="screen-header">
      <button class="back-btn" id="catsBack" type="button" data-t="back">Orqaga</button>
      <h2 data-t="cats_title">🗂 Toifalar</h2>
    </header>
    <div class="form">
      <div class="add-cat-row">
        <input id="newCatInput" type="text" data-t-placeholder="new_cat_ph" placeholder="Yangi toifa">
        <button id="addCatBtn" class="primary-btn" data-t="add_btn">➕ Qo'shish</button>
      </div>
      <div class="info" data-t="cat_warn">Toifani o'chirsangiz, undagi BARCHA mahsulotlar ham o'chiriladi.</div>
      <div id="catsList" class="cats-list"></div>
      <div id="catsErr" class="err hidden"></div>

      <!-- Upsell section -->
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--line)">
        <div style="font-weight:700;font-size:15px;margin-bottom:4px" data-t="upsell_title">➕ Savatcha qo'shimchalari</div>
        <div class="info" data-t="upsell_hint" style="margin-bottom:10px">Qaysi toifalar savatchada "Qo'shish" bo'limida ko'rinishini belgilang.</div>
        <div id="upsellCatsList" style="display:flex;flex-direction:column;gap:6px"></div>
      </div>
    </div>
  </section>

  <!-- Edit modal -->
  <section id="editScreen" class="screen hidden">
    <header class="screen-header">
      <button class="back-btn" id="editBack" type="button" data-t="back">Orqaga</button>
      <h2 id="editTitle" data-t="edit_title">✏ Tahrirlash</h2>
    </header>
    <div class="form" id="editForm">
      <label><span data-t="lbl_name">🍔 Nom</span> <input id="fName" type="text"></label>
      <label><span data-t="lbl_cat">🗂 Toifa</span>
        <select id="fCategory"></select>
      </label>
      <label><span data-t="lbl_price">💰 Narx (so'm)</span> <input id="fPriceVal" type="number" min="0" step="100"></label>
      <label><span data-t="lbl_desc">📝 Tavsif</span> <textarea id="fDesc" rows="3"></textarea></label>
      <label><span data-t="lbl_image">🖼 Rasm URL</span> <input id="fImage" type="url" placeholder="https://..."></label>
      <button id="saveBtn" class="primary-btn" data-t="save_btn">✅ Saqlash</button>
      <button id="delBtn" class="ghost-btn" style="border-color:#a23" data-t="del_btn">🗑 O'chirish</button>
      <div id="formErr" class="err hidden"></div>
    </div>
  </section>
