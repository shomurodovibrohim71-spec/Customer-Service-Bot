<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Orders</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="page-title" data-t="page_title">🛒 Buyurtmalar</div>
    <div class="page-sub" id="totalCount">—</div>
  </header>

  <nav class="tabs" id="ordTabs">
    <button class="tab active" data-st="today">
      <span data-t="tab_today">🟢 Bugun</span> · <span id="cnt_today">0</span>
    </button>
    <button class="tab" data-st="all">
      <span data-t="tab_all">Hammasi</span> · <span id="cnt_all">0</span>
    </button>
    <button class="tab" data-st="confirmed">
      <span data-t="tab_confirmed">✅ Tasdiqlangan</span> · <span id="cnt_confirmed">0</span>
    </button>
    <button class="tab" data-st="delivered">
      <span data-t="tab_delivered">📦 Yetkazilgan</span> · <span id="cnt_delivered">0</span>
    </button>
    <button class="tab" data-st="cancelled">
      <span data-t="tab_cancelled">❌ Bekor</span> · <span id="cnt_cancelled">0</span>
    </button>
  </nav>

  <main class="content">
    <input id="searchInput" class="search-input" type="text" data-t-placeholder="ph_search" placeholder="🔎 ID yoki telefon bo'yicha qidirish…">
    <div id="list">
      <div class="loading" data-t="loading">Yuklanmoqda…</div>
    </div>
  </main>

  <!-- Detail screen -->
  <section id="detailScreen" class="screen hidden">
    <header class="screen-header">
      <button class="back-btn" id="detailBack" type="button" data-t="back">Orqaga</button>
      <h2 id="detailTitle">—</h2>
    </header>
    <div class="content order-detail">
      <div id="detailBody"><div class="loading" data-t="loading">Yuklanmoqda…</div></div>
      <div id="detailErr" class="err hidden"></div>
    </div>
  </section>
