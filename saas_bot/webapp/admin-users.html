<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Mijozlar</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    /* ── Admin Users — premium design ──────────────────────────── */
    .au-topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(15,17,21,0.92);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
      padding: 14px 16px 12px;
    }
    .au-topbar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .au-title { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
    .au-count-pill {
      background: var(--brand-grad); color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: var(--r-pill);
    }

    /* Sort tabs */
    .au-sort-row { display: flex; gap: 6px; }
    .au-sort-btn {
      flex: 1; padding: 8px 0; border-radius: var(--r-pill);
      background: var(--surface); border: 1px solid var(--line);
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      cursor: pointer; text-align: center; white-space: nowrap;
      transition: all .2s var(--ease);
    }
    .au-sort-btn.active { background: var(--brand-grad); border-color: transparent; color: #fff; }

    /* Search */
    .au-search-wrap { position: relative; padding: 10px 14px 0; }
    .au-search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
    .au-search {
      width: 100%; padding: 11px 16px 11px 40px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r-lg); color: var(--text);
      font-size: 14px; box-sizing: border-box; outline: none;
      transition: border-color .2s;
    }
    .au-search:focus { border-color: var(--brand); }

    /* List */
    .au-list { padding: 10px 14px 100px; display: flex; flex-direction: column; gap: 8px; }

    /* User card */
    .au-card {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r-lg); overflow: hidden;
      cursor: pointer; position: relative;
      transition: border-color .2s var(--ease), transform .15s var(--ease);
    }
    .au-card:active { transform: scale(0.99); border-color: var(--brand); }
    .au-card-stripe {
      position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--brand-grad);
    }
    .au-card-inner { padding: 13px 13px 13px 18px; }
    .au-card-row1 { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
    .au-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .au-orders-badge {
      background: rgba(255,122,24,.16); color: var(--brand);
      font-size: 11px; font-weight: 800;
      padding: 3px 10px; border-radius: var(--r-pill); flex-shrink: 0;
    }
    .au-orders-badge.has { background: var(--brand-grad); color: #fff; }
    .au-phone { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .au-meta-row { display: flex; gap: 12px; }
    .au-stat {
      display: flex; align-items: center; gap: 4px;
      background: var(--bg-soft); border-radius: var(--r-sm);
      padding: 4px 9px; font-size: 11px; color: var(--text-muted);
    }
    .au-stat-val { font-weight: 700; color: var(--text); }

    /* Detail sheet */
    .au-sheet-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
      display: flex; flex-direction: column; justify-content: flex-end;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    .au-sheet {
      background: var(--bg-soft); border-radius: 20px 20px 0 0;
      max-height: 82vh; display: flex; flex-direction: column;
      animation: slideUp .25s var(--ease);
    }
    @keyframes slideUp { from { transform:translateY(100%) } to { transform:translateY(0) } }
    .au-sheet-handle { width: 36px; height: 4px; background: var(--line-strong); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
    .au-sheet-head { padding: 14px 16px; flex-shrink: 0; border-bottom: 1px solid var(--line); }
    .au-sheet-name { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
    .au-sheet-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .au-sheet-stats { display: flex; gap: 8px; margin-top: 10px; }
    .au-sheet-stat {
      flex: 1; background: var(--surface); border-radius: var(--r-md);
      padding: 9px 12px; text-align: center;
    }
    .au-sheet-stat-val { font-size: 16px; font-weight: 800; color: var(--brand); }
    .au-sheet-stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .au-orders-list { overflow-y: auto; flex: 1; padding: 10px 14px 28px; }

    /* Order row in sheet */
    .au-order-row {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r-md); padding: 11px 13px; margin-bottom: 7px;
      position: relative; overflow: hidden;
    }
    .au-order-row-stripe {
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .au-order-top { display: flex; justify-content: space-between; align-items: center; }
    .au-order-id { font-size: 13px; font-weight: 700; }
    .au-order-amt { font-size: 14px; font-weight: 800; color: var(--brand); }
    .au-order-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .au-order-items { font-size: 11px; color: var(--text-muted); margin-top: 3px; opacity: .8; }
    .au-order-status {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: var(--r-pill);
    }
    .st-pending    { background: rgba(255,176,32,.18); color: var(--warning); }
    .st-confirmed  { background: rgba(74,222,128,.18); color: #4ade80; }
    .st-preparing  { background: rgba(245,158,11,.18); color: #f59e0b; }
    .st-on_the_way { background: rgba(167,139,250,.18); color: #a78bfa; }
    .st-delivered  { background: rgba(106,203,255,.18); color: var(--accent); }
    .st-cancelled  { background: rgba(255,93,93,.18); color: var(--danger); }
    .stripe-pending    { background: var(--warning); }
    .stripe-confirmed  { background: #4ade80; }
    .stripe-preparing  { background: #f59e0b; }
    .stripe-on_the_way { background: #a78bfa; }
    .stripe-delivered  { background: var(--accent); }
    .stripe-cancelled  { background: var(--danger); }

    .au-empty { text-align: center; padding: 48px 0; color: var(--text-muted); font-size: 14px; }
    .au-empty-icon { font-size: 40px; display: block; margin-bottom: 12px; }
    .au-loading { text-align: center; padding: 48px 0; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>
  <!-- Topbar -->
  <div class="au-topbar">
    <div class="au-topbar-row">
      <div class="au-title" data-t="page_title">👥 Mijozlar</div>
      <div class="au-count-pill" id="totalPill">—</div>
    </div>
    <div class="au-sort-row">
      <button class="au-sort-btn active" id="sLast"   onclick="setSort('last_seen')" data-t="sort_last">🕐 Oxirgi</button>
      <button class="au-sort-btn"        id="sOrders" onclick="setSort('orders')"    data-t="sort_orders">📦 Buyurtma</button>
      <button class="au-sort-btn"        id="sSpend"  onclick="setSort('spend')"     data-t="sort_spend">💰 Summa</button>
    </div>
  </div>

  <!-- Search -->
  <div class="au-search-wrap">
    <span class="au-search-icon">🔍</span>
    <input class="au-search" id="searchInput" type="text" placeholder="Ism yoki telefon…">
  </div>

  <!-- List -->
  <div class="au-list" id="userList">
    <div class="au-loading" data-t="loading">Yuklanmoqda…</div>
  </div>

  <!-- Detail sheet -->
  <div id="sheetBg" class="au-sheet-bg hidden">
    <div class="au-sheet">
      <div class="au-sheet-handle"></div>
      <div class="au-sheet-head">
        <div class="au-sheet-name" id="sheetName"></div>
        <div class="au-sheet-sub"  id="sheetSub"></div>
        <div class="au-sheet-stats">
          <div class="au-sheet-stat">
            <div class="au-sheet-stat-val" id="sheetOrders">—</div>
            <div class="au-sheet-stat-lbl" data-t="stat_orders">Buyurtma</div>
          </div>
          <div class="au-sheet-stat">
            <div class="au-sheet-stat-val" id="sheetSpend">—</div>
            <div class="au-sheet-stat-lbl" data-t="stat_spend">Sarflagan</div>
          </div>
          <div class="au-sheet-stat">
            <div class="au-sheet-stat-val" id="sheetLast">—</div>
            <div class="au-sheet-stat-lbl" data-t="stat_last">So'nggi</div>
          </div>
        </div>
      </div>
      <div class="au-orders-list" id="sheetOrders_list"></div>
    </div>
  </div>

  <script>
    window.STRINGS = {
      uz: {
        page_title:"👥 Mijozlar", loading:"Yuklanmoqda…",
        n_users:"{n} ta mijoz", sort_last:"🕐 Oxirgi", sort_orders:"📦 Buyurtma", sort_spend:"💰 Summa",
        orders_badge:"{n} ta", spend_lbl:"so'm", last_lbl:"so'nggi",
        stat_orders:"Buyurtma", stat_spend:"Sarflagan", stat_last:"So'nggi",
        no_orders:"Buyurtmalar yo'q", empty:"Mijozlar yo'q",
        status_pending:"⏳ Kutilmoqda", status_confirmed:"✅ Tasdiqlandi",
        status_preparing:"👨‍🍳 Tayyorlanmoqda", status_on_the_way:"🚗 Yo'lda",
        status_delivered:"📦 Yetkazildi", status_cancelled:"❌ Bekor",
      },
      en: {
        page_title:"👥 Customers", loading:"Loading…",
        n_users:"{n} customers", sort_last:"🕐 Recent", sort_orders:"📦 Orders", sort_spend:"💰 Spend",
        orders_badge:"{n}", spend_lbl:"sum", last_lbl:"last",
        stat_orders:"Orders", stat_spend:"Spent", stat_last:"Last seen",
        no_orders:"No orders yet", empty:"No customers",
        status_pending:"⏳ Pending", status_confirmed:"✅ Confirmed",
        status_preparing:"👨‍🍳 Preparing", status_on_the_way:"🚗 On the way",
        status_delivered:"📦 Delivered", status_cancelled:"❌ Cancelled",
      },
      ru: {
        page_title:"👥 Клиенты", loading:"Загрузка…",
        n_users:"{n} клиентов", sort_last:"🕐 Последние", sort_orders:"📦 Заказы", sort_spend:"💰 Сумма",
        orders_badge:"{n}", spend_lbl:"сум", last_lbl:"последний",
        stat_orders:"Заказов", stat_spend:"Потрачено", stat_last:"Последний",
        no_orders:"Заказов нет", empty:"Клиентов нет",
        status_pending:"⏳ Ожидает", status_confirmed:"✅ Подтверждён",
        status_preparing:"👨‍🍳 Готовится", status_on_the_way:"🚗 В пути",
        status_delivered:"📦 Доставлен", status_cancelled:"❌ Отменён",
      },
    };
  </script>
  <script src="/static/i18n.js"></script>
  <script src="/static/admin-users.js"></script>
</body>
</html>
