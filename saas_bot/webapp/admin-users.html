<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Mijozlar</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .user-card { background: var(--card); border-radius: 14px; padding: 14px 16px; margin: 0 14px 10px; cursor: pointer; transition: opacity .15s; }
    .user-card:active { opacity: .7; }
    .user-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .user-name { font-weight: 600; font-size: 15px; color: var(--text); }
    .user-phone { font-size: 13px; color: var(--sub); }
    .user-meta { display: flex; gap: 14px; margin-top: 6px; }
    .user-stat { font-size: 12px; color: var(--sub); }
    .user-stat strong { color: var(--text); }
    .user-badge { background: var(--accent); color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .search-box { margin: 14px; display: flex; gap: 8px; }
    .search-box input { flex: 1; background: var(--card); border: none; border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
    .sort-btn { background: var(--card); border: none; border-radius: 10px; padding: 10px 12px; color: var(--sub); font-size: 13px; cursor: pointer; white-space: nowrap; }
    .sort-btn.active { color: var(--accent); }
    /* Detail modal */
    .detail-bg { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; }
    .detail-sheet { background: var(--bg); border-radius: 18px 18px 0 0; max-height: 80vh; overflow-y: auto; padding: 18px 16px 32px; }
    .detail-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .detail-sub { color: var(--sub); font-size: 13px; margin-bottom: 14px; }
    .order-row { background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
    .order-row-top { display: flex; justify-content: space-between; }
    .order-id { font-weight: 600; font-size: 14px; }
    .order-amt { font-weight: 600; font-size: 14px; color: var(--accent); }
    .order-row-sub { color: var(--sub); font-size: 12px; margin-top: 3px; }
    .close-btn { display: block; text-align: center; margin: 14px 0 0; color: var(--sub); font-size: 14px; cursor: pointer; padding: 10px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="page-title" data-t="page_title">👥 Mijozlar</div>
    <div class="page-sub" id="totalSub">—</div>
  </header>

  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Ism yoki telefon…">
    <button class="sort-btn active" id="sortLast" onclick="setSort('last_seen')">🕐</button>
    <button class="sort-btn" id="sortOrders" onclick="setSort('orders')">📦</button>
    <button class="sort-btn" id="sortSpend" onclick="setSort('spend')">💰</button>
  </div>

  <main>
    <div id="errBox" class="err hidden" style="margin:0 14px 10px"></div>
    <div id="loading" class="loading" data-t="loading">Yuklanmoqda…</div>
    <div id="userList"></div>
  </main>

  <!-- Detail modal -->
  <div id="detailBg" class="detail-bg hidden">
    <div class="detail-sheet">
      <div class="detail-title" id="detailName"></div>
      <div class="detail-sub" id="detailSub"></div>
      <div id="detailOrders"></div>
      <div class="close-btn" onclick="closeDetail()" data-t="close_btn">✕ Yopish</div>
    </div>
  </div>

  <script>
    window.STRINGS = {
      uz: { page_title:"👥 Mijozlar", loading:"Yuklanmoqda…", close_btn:"✕ Yopish",
            total_users:"{n} ta mijoz", orders_label:"buyurtma", spend_label:"so'm sarflagan",
            last_label:"so'nggi", no_orders:"Buyurtmalar yo'q", loading_orders:"Yuklanmoqda…",
            status_pending:"⏳ Kutilmoqda", status_confirmed:"✅ Tasdiqlandi",
            status_preparing:"👨‍🍳 Tayyorlanmoqda", status_on_the_way:"🚗 Yo'lda",
            status_delivered:"📦 Yetkazildi", status_cancelled:"❌ Bekor" },
      en: { page_title:"👥 Customers", loading:"Loading…", close_btn:"✕ Close",
            total_users:"{n} customers", orders_label:"orders", spend_label:"spent",
            last_label:"last", no_orders:"No orders yet", loading_orders:"Loading…",
            status_pending:"⏳ Pending", status_confirmed:"✅ Confirmed",
            status_preparing:"👨‍🍳 Preparing", status_on_the_way:"🚗 On the way",
            status_delivered:"📦 Delivered", status_cancelled:"❌ Cancelled" },
      ru: { page_title:"👥 Клиенты", loading:"Загрузка…", close_btn:"✕ Закрыть",
            total_users:"{n} клиентов", orders_label:"заказов", spend_label:"потрачено",
            last_label:"последний", no_orders:"Заказов нет", loading_orders:"Загрузка…",
            status_pending:"⏳ Ожидает", status_confirmed:"✅ Подтверждён",
            status_preparing:"👨‍🍳 Готовится", status_on_the_way:"🚗 В пути",
            status_delivered:"📦 Доставлен", status_cancelled:"❌ Отменён" },
    };
  </script>
  <script src="/static/i18n.js"></script>
  <script src="/static/admin-users.js"></script>
</body>
</html>
